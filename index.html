<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pack — Shared gear & packing notes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="hdr">
      <h1>⛰ Pack</h1>
      <p class="muted">Shared gear &amp; packing notes — anyone can read and post.</p>
    </header>

    <form id="note-form" class="note-form">
      <textarea
        id="note-body"
        placeholder="Post a note… e.g. 'Carabiners — 5 for climbing, 2 for highlining'"
        rows="4"
        required
      ></textarea>
      <div class="form-actions">
        <div id="status" class="status muted" role="status" aria-live="polite"></div>
        <button type="submit" id="submit-btn" class="btn btn-primary">Post note</button>
      </div>
    </form>

    <section class="notes">
      <h2>Recent notes</h2>
      <ul id="notes-list" class="notes-list" aria-live="polite"></ul>
    </section>
  </main>

  <script src="env.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
